api:
  dashboard: true
  insecure: true
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        readTimeout: 24h
    http:
      encodedCharacters:
        allowEncodedSlash: true
        allowEncodedQuestionMark: true
        allowEncodedPercent: true
  traefik:
    address: ":8080"
global:
  checkNewVersion: true
  sendAnonymousUsage: false
log:
  level: DEBUG
providers:
  # Even though we are using Podman, we still need to use the Docker provider.
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
certificatesResolvers:
  letsencrypt:
    acme:
      email: TRAEFIK_EMAIL
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: web
serversTransport:
  insecureSkipVerify: true
